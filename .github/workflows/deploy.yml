## STEP 5: Enable GitHub Pages

1. On your repo page, click **"Settings"** (in the top menu bar — next to Insights)
2. In the left sidebar, click **"Pages"**
3. Under **"Source"**, open the dropdown and select **"GitHub Actions"**

